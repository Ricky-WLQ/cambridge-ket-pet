services:
  postgres:
    image: postgres:16-alpine
    container_name: ketpet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ketpet
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ketpet"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres-data:
